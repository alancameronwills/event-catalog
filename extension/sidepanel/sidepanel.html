<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Event Catalog</title>
    <link rel="stylesheet" href="sidepanel.css" />
  </head>
  <body>
    <div class="panel-top">
      <header class="panel-header">
        <h1>Event Catalog</h1>
        <div class="header-right">
          <span id="count" class="count" aria-live="polite"></span>
          <!-- Icon-only controls: expand all months, filter to un-handled
               events, and upload those events to the external site. -->
          <button id="expand-btn" class="btn btn-icon" type="button" title="Expand all months" aria-label="Expand all months">
            <svg viewBox="0 0 16 16" width="14" height="14" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M6 2H2v4M10 2h4v4M6 14H2v-4M10 14h4v-4"/></svg>
          </button>
          <button id="filter-btn" class="btn btn-icon" type="button" title="Show only events still to upload" aria-label="Show only events still to upload" aria-pressed="false">
            <svg viewBox="0 0 16 16" width="14" height="14" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M2 3h12l-4.6 5.5V13L7 11V8.5L2 3z"/></svg>
          </button>
          <button id="upload-btn" class="btn btn-icon" type="button" title="Upload events to gigiau.uk" aria-label="Upload events to gigiau.uk">
            <svg viewBox="0 0 16 16" width="14" height="14" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M8 11V3M5 6l3-3 3 3M3 13h10"/></svg>
          </button>
        </div>
      </header>

      <!-- Always-visible: pick a date and add an (empty) date group to file
           posters under. -->
      <form id="add-date-form" class="add-date-form">
        <input type="date" id="add-date-input" required />
        <button type="submit" class="btn">Add date</button>
      </form>
    </div>

    <p id="status" class="status" hidden></p>

    <p id="hint" class="hint" hidden></p>

    <main id="catalog" class="catalog">
      <p id="empty" class="empty">
        No events yet. Right-click an event poster and choose
        <strong>&ldquo;Add to event catalog&rdquo;</strong>.
      </p>
      <p id="emptyFiltered" class="empty">
        No events ready to upload. Right-click an event poster and choose
        <strong>&ldquo;Add to event catalog&rdquo;</strong>
        or <a href="#" id="turnOffFilter">turn off the filter</a> to see uploaded events.
      </p>
    </main>

    <!-- Enlarged poster fills the space above; when editing, the form docks
         below it and both close together on save/cancel. -->
    <div id="lightbox" class="lightbox" hidden>
      <div class="lightbox-image">
        <img id="lightbox-img" alt="Enlarged poster" />
      </div>
      <form id="editor-form" class="editor-card" hidden>
        <p id="editor-dup-warning" class="dup-warning" hidden></p>
        <div class="editor-fields">
          <label>Title <input type="text" id="editor-title" autocomplete="off" /></label>
          <label>Venue
            <input type="text" id="editor-venue" autocomplete="off" list="venue-suggestions" />
            <datalist id="venue-suggestions"></datalist>
          </label>
          <label>Date <input type="date" id="editor-date" /></label>
          <label title="Only for multi-day events">End date <input type="date" id="editor-end-date" /></label>
          <label>Time <input type="time" id="editor-time" /></label>
          <label>URL <input type="url" id="editor-url" autocomplete="off" placeholder="https://…" /></label>
        </div>
        <div class="editor-actions">
          <button type="submit" class="btn">Save</button>
          <button type="button" id="editor-cancel" class="btn btn-plain">Cancel</button>
        </div>
      </form>
    </div>

    <script src="sidepanel.js"></script>
  </body>
</html>
